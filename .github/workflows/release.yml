name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""
        type: string
      release_notes:
        description: "Release notes (optional)"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve tag from tauri.conf.json
      id: tag
      shell: bash
      run: |
        set -euo pipefail
        TAG=$(python3 - <<'PY'
        import json

        with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as f:
            conf = json.load(f)

        version = str(conf.get('version', '')).strip()
        if not version:
            raise SystemExit('Missing version in src-tauri/tauri.conf.json')

        print(version if version.startswith('v') else f'v{version}')
        PY
        )

        echo "Resolved tag: $TAG"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Create and push tag (if not exists)
      shell: bash
      run: |
        set -euo pipefail
        TAG="${{ steps.tag.outputs.tag }}"

        if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skip creating."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tag $TAG created and pushed."
        fi

  build-and-release:
    needs: prepare-tag
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install frontend dependencies
      run: npm ci

    - name: Build app and publish release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: ${{ needs.prepare-tag.outputs.tag }}
        releaseName: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || format('Rosetta {0}', needs.prepare-tag.outputs.tag) }}
        releaseBody: ${{ github.event.inputs.release_notes != '' && github.event.inputs.release_notes || format('Automated release for {0}', needs.prepare-tag.outputs.tag) }}
        releaseDraft: ${{ github.event.inputs.draft }}
        prerelease: ${{ github.event.inputs.prerelease }}
